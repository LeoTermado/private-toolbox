{% extends "base.html" %}
{% block title %}PDF Splitter — Private Toolbox{% endblock %}

{% block content %}
<header class="page-header">
    <h1>📄 PDF Splitter</h1>
    <p class="subtitle">Upload a PDF and define custom page segments to split.</p>
</header>

<div class="panel">
    <form action="{{ url_for('pdf_splitter.split') }}" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">Select PDF File</label>
            <input type="file" id="file" name="file" accept=".pdf" required>
        </div>

        <div class="form-group">
            <label for="ranges">Page Ranges</label>
            <input type="text" id="ranges" name="ranges" placeholder="e.g., 1-10, 15, 20-25" required>
        </div>

        <button type="submit" class="btn">Split &amp; Download ZIP</button>
    </form>

    <form action="{{ url_for('pdf_splitter.archive') }}" method="POST">
        <button type="submit" class="btn btn-secondary">📦 Archive Current Files to 'old'</button>
    </form>
</div>
{% endblock %}
